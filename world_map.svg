<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- Watercolor gradient for continents -->
    <linearGradient id="watercolor1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5"/>
      <stop offset="30%" style="stop-color:#6b5b95"/>
      <stop offset="60%" style="stop-color:#4169aa"/>
      <stop offset="100%" style="stop-color:#7b68a6"/>
    </linearGradient>
    <linearGradient id="watercolor2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5d6d9e"/>
      <stop offset="40%" style="stop-color:#8b7bab"/>
      <stop offset="70%" style="stop-color:#4a7fb5"/>
      <stop offset="100%" style="stop-color:#6a5a94"/>
    </linearGradient>
    <linearGradient id="watercolor3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b6ba6"/>
      <stop offset="50%" style="stop-color:#4a80b0"/>
      <stop offset="100%" style="stop-color:#5b5b95"/>
    </linearGradient>
    <!-- Filter for watercolor effect -->
    <filter id="watercolorFilter" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fefefe"/>

  <!-- North America -->
  <path fill="url(#watercolor1)" filter="url(#watercolorFilter)" d="
    M 30 70
    Q 40 60, 60 55
    Q 90 50, 120 52
    Q 140 48, 160 55
    Q 175 50, 185 58
    Q 195 52, 205 60
    L 210 75
    Q 200 85, 190 90
    Q 180 95, 175 105
    Q 165 115, 155 120
    Q 145 130, 140 145
    Q 135 155, 125 165
    Q 115 175, 105 180
    L 95 190
    Q 85 185, 80 175
    Q 70 165, 65 155
    Q 55 145, 50 135
    Q 40 125, 35 115
    Q 25 105, 22 95
    Q 20 85, 25 75
    Z"/>

  <!-- Greenland -->
  <path fill="url(#watercolor2)" filter="url(#watercolorFilter)" d="
    M 265 35
    Q 280 30, 295 35
    Q 310 40, 305 55
    Q 300 70, 285 75
    Q 270 78, 260 70
    Q 250 60, 255 45
    Z"/>

  <!-- South America -->
  <path fill="url(#watercolor3)" filter="url(#watercolorFilter)" d="
    M 165 195
    Q 175 190, 185 195
    Q 195 200, 200 215
    Q 210 235, 205 260
    Q 200 285, 190 310
    Q 180 335, 165 355
    Q 155 365, 145 360
