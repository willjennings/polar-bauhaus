<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Widgets - 12 Faces of Time</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #1C1C1E;
      min-height: 100vh;
      color: #fff;
    }

    /* Header */
    header {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #DE0100 0%, #FAD201 50%, #0000A0 100%);
      border-radius: 8px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .palette-swatches {
      display: flex;
      gap: 6px;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }

    .swatch:hover {
      transform: scale(1.15);
    }

    .swatch.active {
      border-color: #fff;
    }

    .add-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .add-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Widget Grid */
    .widget-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Widget Card */
    .widget-card {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }

    .widget-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    .widget-clock {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .widget-clock svg {
      max-width: 100%;
      max-height: 180px;
    }

    .widget-info {
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .widget-face-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
    }

    .widget-city {
      font-size: 14px;
      font-weight: 500;
      margin-top: 2px;
    }

    .widget-time {
      font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }

    /* Face picker overlay */
    .face-picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .face-picker-overlay.active {
      display: flex;
    }

    .face-picker {
      background: #2C2C2E;
      border-radius: 20px;
      padding: 24px;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .face-picker h2 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .face-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .face-option {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      text-align: center;
    }

    .face-option:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
    }

    .face-option.selected {
      background: rgba(222, 1, 0, 0.3);
      outline: 2px solid #DE0100;
    }

    .face-option svg {
      max-width: 100%;
      height: 80px;
      margin-bottom: 8px;
    }

    .face-option-name {
      font-size: 12px;
      font-weight: 500;
    }

    .face-option-era {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }

    .close-picker {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
    }

    /* Timezone picker modal */
    .timezone-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .timezone-modal.active {
      display: flex;
    }

    .timezone-picker {
      background: #2C2C2E;
      border-radius: 16px;
      padding: 24px;
      width: 320px;
      max-height: 60vh;
    }

    .timezone-picker h3 {
      margin-bottom: 16px;
    }

    .timezone-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .timezone-option {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      transition: background 0.15s;
    }

    .timezone-option:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 300;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      .widget-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .face-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      header {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        <h1>Clock Widgets</h1>
        <p class="subtitle">12 Faces of Time</p>
      </div>
    </div>
    <div class="controls">
      <div class="palette-swatches">
        <div class="swatch active" data-palette="mondrian" style="background: linear-gradient(135deg, #DE0100, #FAD201, #0000A0);" title="Mondrian"></div>
        <div class="swatch" data-palette="kandinsky" style="background: linear-gradient(135deg, #E4572E, #17BEBB, #FFC914);" title="Kandinsky"></div>
        <div class="swatch" data-palette="albers" style="background: linear-gradient(135deg, #C2883A, #8B7355, #D4A84B);" title="Albers"></div>
        <div class="swatch" data-palette="klee" style="background: linear-gradient(135deg, #8B4513, #2F4F4F, #CD853F);" title="Klee"></div>
        <div class="swatch" data-palette="bayer" style="background: linear-gradient(135deg, #FF3B30, #007AFF, #FFCC00);" title="Bayer"></div>
        <div class="swatch" data-palette="moholy" style="background: linear-gradient(135deg, #B8860B, #708090, #C0C0C0);" title="Moholy-Nagy"></div>
      </div>
      <button class="add-btn" id="add-clock">
        <span>+</span> Add Clock
      </button>
    </div>
  </header>

  <main class="widget-grid" id="widgets"></main>

  <!-- Face picker modal -->
  <div class="face-picker-overlay" id="face-picker-overlay">
    <button class="close-picker" onclick="closeFacePicker()">×</button>
    <div class="face-picker">
      <h2>Choose a Face</h2>
      <div class="face-grid" id="face-options"></div>
    </div>
  </div>

  <!-- Timezone picker modal -->
  <div class="timezone-modal" id="timezone-modal">
    <div class="timezone-picker">
      <h3>Select Timezone</h3>
      <div class="timezone-list" id="timezone-list"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { createWorldClock, updateClockHands } from '../src/components/WorldClock.js';
    import { createSingleClock } from '../src/components/SingleClock.js';
    import { getHandAnimationCSS } from '../src/components/Hand.js';
    import { getAllFaces, getAllFaceCSS, getFaceIds } from '../src/faces/index.js';
    import { getTimezoneInfo, getTimeForZone, getAvailableTimezones } from '../src/core/ClockEngine.js';

    // State
    let widgets = [
      { zone: 'local', faceType: 'swiss-railway' },
      { zone: 'Europe/London', faceType: 'braun' },
      { zone: 'Asia/Tokyo', faceType: 'mondrian' },
      { zone: 'America/New_York', faceType: 'flip-clock' }
    ];
    let currentPalette = 'mondrian';
    let editingWidgetIndex = null;

    const faces = getAllFaces();
    const timezones = [
      'local', 'America/New_York', 'America/Los_Angeles', 'America/Chicago',
      'Europe/London', 'Europe/Paris', 'Europe/Berlin', 'Europe/Moscow',
      'Asia/Tokyo', 'Asia/Shanghai', 'Asia/Dubai', 'Asia/Singapore',
      'Australia/Sydney', 'Pacific/Auckland'
    ];

    // Render all widgets
    function render() {
      const container = document.getElementById('widgets');
      container.innerHTML = '';

      widgets.forEach((widget, index) => {
        const card = document.createElement('div');
        card.className = 'widget-card';
        card.onclick = () => openFacePicker(index);

        const info = getTimezoneInfo(widget.zone);
        const time = getTimeForZone(widget.zone);
        const timeStr = `${String(time.hours).padStart(2, '0')}:${String(time.minutes).padStart(2, '0')}`;
        const face = faces.find(f => f.id === widget.faceType) || faces[0];

        // Create clock SVG
        const clockSvg = createSingleClock({
          cx: 90,
          cy: 90,
          radius: 80,
          zone: widget.zone,
          faceType: widget.faceType,
          config: {
            theme: { palette: currentPalette, background: 'dark' }
          }
        });

        card.innerHTML = `
          <div class="widget-clock">
            <svg viewBox="0 0 180 180" width="180" height="180">
              <style>${getHandAnimationCSS()}${getAllFaceCSS()}</style>
              ${clockSvg}
            </svg>
          </div>
          <div class="widget-info">
            <div>
              <div class="widget-face-name">${face.name}</div>
              <div class="widget-city">${info.city}</div>
            </div>
            <div class="widget-time">${timeStr}</div>
          </div>
        `;

        card.dataset.index = index;
        container.appendChild(card);
      });
    }

    // Update clocks every second
    function updateClocks() {
      document.querySelectorAll('.widget-card').forEach((card, index) => {
        const widget = widgets[index];
        if (!widget) return;

        const time = getTimeForZone(widget.zone);
        const timeStr = `${String(time.hours).padStart(2, '0')}:${String(time.minutes).padStart(2, '0')}`;
        const timeEl = card.querySelector('.widget-time');
        if (timeEl) timeEl.textContent = timeStr;

        // Update hands
        const clockGroup = card.querySelector('.bauhaus-single-clock');
        if (clockGroup) {
          updateClockHands(card, [widget.zone], {});
        }
      });
    }

    // Face picker
    function openFacePicker(index) {
      editingWidgetIndex = index;
      const overlay = document.getElementById('face-picker-overlay');
      const grid = document.getElementById('face-options');
      const currentFace = widgets[index].faceType;

      grid.innerHTML = faces.map(face => `
        <div class="face-option ${face.id === currentFace ? 'selected' : ''}" data-face="${face.id}">
          <svg viewBox="0 0 100 100" width="80" height="80">
            <style>${getHandAnimationCSS()}${getAllFaceCSS()}</style>
            ${createSingleClock({
              cx: 50, cy: 50, radius: 40,
              zone: widgets[index].zone,
              faceType: face.id,
              config: { theme: { palette: currentPalette, background: 'dark' } }
            })}
          </svg>
          <div class="face-option-name">${face.name}</div>
          <div class="face-option-era">${face.era}</div>
        </div>
      `).join('');

      // Add click handlers
      grid.querySelectorAll('.face-option').forEach(option => {
        option.onclick = () => selectFace(option.dataset.face);
      });

      overlay.classList.add('active');
    }

    function closeFacePicker() {
      document.getElementById('face-picker-overlay').classList.remove('active');
      editingWidgetIndex = null;
    }

    function selectFace(faceId) {
      if (editingWidgetIndex !== null) {
        widgets[editingWidgetIndex].faceType = faceId;
        render();
        closeFacePicker();
        showToast(`Face changed to ${faces.find(f => f.id === faceId).name}`);
      }
    }

    // Timezone picker
    function openTimezonePicker() {
      const modal = document.getElementById('timezone-modal');
      const list = document.getElementById('timezone-list');

      list.innerHTML = timezones.map(tz => {
        const info = getTimezoneInfo(tz);
        return `
          <div class="timezone-option" data-zone="${tz}">
            <span>${info.city}</span>
            <span style="opacity: 0.5">${info.offsetString}</span>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.timezone-option').forEach(option => {
        option.onclick = () => {
          addWidget(option.dataset.zone);
          modal.classList.remove('active');
        };
      });

      modal.classList.add('active');
    }

    function addWidget(zone) {
      // Cycle through face types for variety
      const faceIds = getFaceIds();
      const faceType = faceIds[widgets.length % faceIds.length];
      widgets.push({ zone, faceType });
      render();
      showToast(`Added ${getTimezoneInfo(zone).city}`);
    }

    // Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2000);
    }

    // Palette switching
    document.querySelectorAll('.swatch').forEach(swatch => {
      swatch.onclick = () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        currentPalette = swatch.dataset.palette;
        render();
        showToast(`Theme: ${currentPalette.charAt(0).toUpperCase() + currentPalette.slice(1)}`);
      };
    });

    // Add clock button
    document.getElementById('add-clock').onclick = openTimezonePicker;

    // Close modals on backdrop click
    document.getElementById('face-picker-overlay').onclick = (e) => {
      if (e.target.id === 'face-picker-overlay') closeFacePicker();
    };
    document.getElementById('timezone-modal').onclick = (e) => {
      if (e.target.id === 'timezone-modal') {
        document.getElementById('timezone-modal').classList.remove('active');
      }
    };

    // Initialize
    render();
    setInterval(updateClocks, 1000);
    setInterval(render, 60000); // Full re-render every minute for face updates
  </script>
</body>
</html>
